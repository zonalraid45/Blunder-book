<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blunder Book - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#0b0f14;color:#e5e7eb}
.nav{display:flex;justify-content:space-between;padding:20px 40px;border-bottom:1px solid #1f2937}
.logo{color:#3b82f6;font-weight:700;font-size:20px}
.nav-right{display:flex;gap:25px;align-items:center}
.logout{color:#ef4444;cursor:pointer}
.container{max-width:1100px;margin:auto;padding:60px 20px}
h1{font-size:32px;margin-bottom:10px}
.username{color:#3b82f6;margin-bottom:40px}
.cards{display:flex;gap:20px;flex-wrap:wrap}
.card{background:#111827;padding:25px;border-radius:14px;border:1px solid #1f2937;width:200px}
.card h3{font-size:14px;color:#9ca3af;margin-bottom:10px}
.card p{font-size:28px;font-weight:600}
.sync-box{
margin-top:60px;
background:#0f172a;
padding:40px;
border-radius:18px;
border:1px solid #3b82f6;
box-shadow:0 0 25px rgba(59,130,246,0.15);
max-width:700px
}
.sync-box h2{
font-size:22px;
letter-spacing:2px;
color:#93c5fd;
margin-bottom:20px
}
.sync-box p{
color:#9ca3af;
font-size:18px;
margin-bottom:30px
}
.sync-btn{
background:#1d4ed8;
padding:18px 30px;
border-radius:14px;
border:1px solid #3b82f6;
color:white;
font-size:18px;
cursor:pointer;
width:100%;
transition:0.3s
}
.sync-btn:hover{
background:#2563eb;
box-shadow:0 0 20px rgba(59,130,246,0.3)
}
</style>
</head>
<body>

<div class="nav">
<div class="logo">Blunder Book</div>
<div class="nav-right">
<div id="navUser"></div>
<div class="logout" onclick="logout()">Logout</div>
</div>
</div>

<div class="container">
<h1>Dashboard</h1>
<div class="username" id="username"></div>

<div class="cards">
<div class="card">
<h3>Games Imported</h3>
<p id="games">0</p>
</div>
<div class="card">
<h3>Puzzles Created</h3>
<p>0</p>
</div>
<div class="card">
<h3>Puzzles Trained</h3>
<p>0</p>
</div>
<div class="card">
<h3>Accuracy</h3>
<p>0%</p>
</div>
</div>

<div class="sync-box">
<h2>IMPORT GAMES</h2>
<p>Fetch your cloud analyzed games and generate tactics. Unlimited sync. All free.</p>
<button class="sync-btn" onclick="fetchGames()">Sync from Lichess</button>
</div>

</div>

<script>
const token=localStorage.getItem("lichess_token")
if(!token){window.location.href="index.html"}

async function loadProfile(){
const res=await fetch("https://lichess.org/api/account",{headers:{"Authorization":"Bearer "+token}})
const data=await res.json()
document.getElementById("username").innerText=data.username
document.getElementById("navUser").innerText=data.username
}

async function fetchGames(){
const res=await fetch("https://lichess.org/api/games/user/me?max=100",{
headers:{
"Authorization":"Bearer "+token,
"Accept":"application/x-ndjson"
}
})
const text=await res.text()
const count=text.trim()?text.trim().split("\n").length:0
document.getElementById("games").innerText=count
}

function logout(){
localStorage.removeItem("lichess_token")
window.location.href="index.html"
}

loadProfile()
</script>

</body>
</html>
